<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Testcard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #111; overflow-y: auto; }
    #overview { display: flex; flex-wrap: wrap; gap: 12px; padding: 16px; padding-right: 320px; }
    #overview canvas { background: #000; cursor: pointer; max-width: 100%; height: auto; border: 2px solid transparent; transition: border-color 0.15s; }
    #overview canvas.active { border-color: #2a6; }
    #overview canvas:hover { border-color: #444; }
    #single { display: none; }
    #single canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; }
    .tp-dfwv { position: fixed !important; top: 8px; right: 8px; z-index: 10; width: 300px !important; }
  </style>
</head>
<body>
  <div id="overview"></div>
  <div id="single"><canvas id="canvas"></canvas></div>
  <script type="module" src="testcard.js"></script>
</body>
</html>
